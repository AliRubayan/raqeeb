kind = "web"
previewPath = "/"
title = "Raqeeb — Contract Analysis Platform"
version = "1.0.0"
id = "artifacts/raqeeb-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18970

[services.development]
run = "pnpm --filter @workspace/raqeeb-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/raqeeb-web", "run", "build" ]
publicDir = "artifacts/raqeeb-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18970"
BASE_PATH = "/"
